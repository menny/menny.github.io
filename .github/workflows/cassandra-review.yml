name: Cassandra Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-24.04
    # Skip the job if it is a cross-repository PR (secrets are not available for external PRs)
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3562238
          private-key: ${{ secrets.CASSANDRA_APP_PRIVATE_KEY }}
      - name: Run Cassandra AI Review
        uses: menny/cassandra@v0.4.0
        with:
          provider_api_key: ${{ secrets.GEMINI_API_KEY }}
          reviewer_github_token: ${{ steps.app-token.outputs.token }}
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          submit_review_action: 'true'
        env:
          CASSANDRA_BRAVE_SEARCH_MCP: ${{ secrets.CASSANDRA_BRAVE_SEARCH_MCP }}
